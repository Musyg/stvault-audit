<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  @font-face { font-family:'Outfit'; src:url('fonts/Outfit-Regular.ttf'); font-weight:400; }
  @font-face { font-family:'Outfit'; src:url('fonts/Outfit-Bold.ttf'); font-weight:700; }
  @font-face { font-family:'Geist Mono'; src:url('fonts/GeistMono-Regular.ttf'); font-weight:400; }
  @page { size: A4; margin: 0; }
  html, body { margin:0; padding:0; }
  .cover {
    width:210mm; height:297mm; box-sizing:border-box;
    background:#0f1216; color:#eef2f6; position:relative; overflow:hidden;
    font-family:'Outfit', sans-serif; padding:24mm 22mm;
  }
  /* faint blue diagonal accent */
  .glow { position:absolute; right:-60mm; top:-40mm; width:160mm; height:160mm;
    background:radial-gradient(circle at center, rgba(0,129,242,0.22), rgba(0,129,242,0) 70%); }
  .grid { position:absolute; inset:0; background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size:14mm 14mm; }
  .brand { display:flex; align-items:center; gap:10px; position:relative; }
  .mark { width:34px; height:34px; }
  .brand-name { font-weight:700; letter-spacing:3px; font-size:20px; }
  .brand-sub { color:#7f8b99; letter-spacing:2px; font-size:10px; margin-top:2px; }
  .eyebrow { position:relative; margin-top:120mm; color:#1a93fe; font-weight:700;
    letter-spacing:4px; font-size:12px; text-transform:uppercase; }
  .title { position:relative; font-weight:700; font-size:62px; line-height:1.02; margin:10px 0 0 0; }
  .rule { position:relative; width:80mm; height:3px; background:#0081f2; margin:22px 0 16px 0; }
  .sub { position:relative; color:#aeb8c4; font-size:15px; }
  .footer { position:absolute; left:22mm; right:22mm; bottom:22mm; display:flex;
    justify-content:space-between; align-items:flex-end; color:#7f8b99; }
  .footer .who { color:#cfd6de; font-size:13px; }
  .footer .who b { color:#fff; }
  .mono { font-family:'Geist Mono', monospace; font-size:10px; color:#6f7a87; }
</style>
</head>
<body>
  <div class="cover">
    <div class="glow"></div>
    <div class="grid"></div>

    <div class="brand">
      <svg class="mark" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M24 3 L42 10 V24 C42 36 34 43 24 46 C14 43 6 36 6 24 V10 Z"
              stroke="#0081f2" stroke-width="2.5" fill="rgba(0,129,242,0.06)"/>
        <path d="M16 24 L22 30 L33 18" stroke="#1a93fe" stroke-width="2.8"
              fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div>
        <div class="brand-name">GILLES MUSY</div>
        <div class="brand-sub">SMART CONTRACT SECURITY</div>
      </div>
    </div>

    <div class="eyebrow">Security Review</div>
    <div class="title">StVault</div>
    <div class="rule"></div>
    <div class="sub">Collateralized borrowing vault &middot; Demonstration engagement</div>

    <div class="footer">
      <div class="who">
        Researcher: <b>Gilles Musy</b><br>
        <span class="mono">Code4rena GiMu84 &middot; Cantina GilMu</span>
      </div>
      <div class="who" style="text-align:right;">
        June 2026<br>
        <span class="mono">commit 6e0fc09</span>
      </div>
    </div>
  </div>
</body>
</html>
